name: Release and Publish

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  id-token: write # Required for OIDC trusted publishing

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - run: bun install

      - name: Sync versions from tag
        run: bun scripts/sync-versions.ts ${GITHUB_REF_NAME#v}

      - name: Copy README into package
        run: cp README.md packages/plexus-pi/README.md

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          package-manager-cache: false

      - name: Publish @mcowger/pi-plexus
        run: npm publish --access public --provenance
        working-directory: packages/plexus-pi
